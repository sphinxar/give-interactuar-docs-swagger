swagger: "2.0"
info:
  title: GIVE Interactuar API
  description: >
    Read-only REST API for the GIVE Interactuar impact-measurement platform.
    Backed by Supabase (PostgreSQL). All timestamps are ISO 8601 UTC.
    Field names in the wire format follow snake_case matching database column names.
  version: "1.0.0"
  contact:
    name: ACTA Team
host: give-interactuar.vercel.app
basePath: /api
schemes:
  - https
consumes:
  - application/json
produces:
  - application/json

# ── Tags ──────────────────────────────────────────────────────────────────────

tags:
  - name: organizations
    description: Organizations and internal users
  - name: entrepreneurs
    description: Entrepreneurs, business profiles, snapshots, and financial profiles
  - name: credentials
    description: Verifiable credentials, issuance drafts, and credential templates
  - name: forms-sync
    description: Form sources, raw submissions, and sync run logs
  - name: verification
    description: Credential verification records
  - name: analytics
    description: Dashboard aggregates and entrepreneur records
  - name: impact-credentials
    description: Derived impact measurement credentials (impact, behavior, profile)
  - name: entrepreneur-risk
    description: Entrepreneur risk table with credit status, overdue details, and accompaniment

# ── Reusable Responses ────────────────────────────────────────────────────────

responses:
  Error400:
    description: Bad request — invalid query parameter or malformed UUID
    schema:
      $ref: '#/definitions/ErrorBody'
  Error404:
    description: Resource not found
    schema:
      $ref: '#/definitions/ErrorBody'
  Error500:
    description: Internal server error
    schema:
      $ref: '#/definitions/ErrorBody'

# ── Definitions ───────────────────────────────────────────────────────────────

definitions:

  # --- Utility -----------------------------------------------------------------

  ErrorBody:
    type: object
    required:
      - error
      - message
    properties:
      error:
        type: string
        description: Machine-readable error code (e.g. NOT_FOUND, INVALID_PARAM)
      message:
        type: string
        description: Human-readable error description
      details:
        type: object
        additionalProperties: true
        x-nullable: true

  PaginationMeta:
    type: object
    required:
      - total
      - page
      - page_size
      - has_next
    properties:
      total:
        type: integer
        description: Total records matching the query (unpaginated)
      page:
        type: integer
        minimum: 1
      page_size:
        type: integer
        minimum: 1
      has_next:
        type: boolean

  # --- organizations -----------------------------------------------------------

  Organization:
    type: object
    required:
      - id
      - name
      - active
      - created_at
      - updated_at
    properties:
      id:
        type: string
        format: uuid
        readOnly: true
      name:
        type: string
      legal_name:
        type: string
        x-nullable: true
      document_type:
        type: string
        x-nullable: true
      document_number:
        type: string
        x-nullable: true
      email:
        type: string
        format: email
        x-nullable: true
      phone:
        type: string
        x-nullable: true
      metadata:
        type: object
        additionalProperties: true
      active:
        type: boolean
      created_at:
        type: string
        format: date-time
        readOnly: true
      updated_at:
        type: string
        format: date-time
        readOnly: true

  InternalUser:
    type: object
    required:
      - id
      - organization_id
      - full_name
      - email
      - role
      - active
      - created_at
      - updated_at
    properties:
      id:
        type: string
        format: uuid
        readOnly: true
      auth_user_id:
        type: string
        format: uuid
        x-nullable: true
      organization_id:
        type: string
        format: uuid
      full_name:
        type: string
      email:
        type: string
        format: email
      role:
        type: string
        enum: [admin, operator, viewer]
      active:
        type: boolean
      created_at:
        type: string
        format: date-time
        readOnly: true
      updated_at:
        type: string
        format: date-time
        readOnly: true

  # --- entrepreneurs -----------------------------------------------------------

  Entrepreneur:
    type: object
    required:
      - id
      - organization_id
      - first_name
      - last_name
      - full_name
      - document_type
      - document_number
      - country
      - active
      - created_at
      - updated_at
    properties:
      id:
        type: string
        format: uuid
        readOnly: true
      organization_id:
        type: string
        format: uuid
      first_name:
        type: string
      last_name:
        type: string
      full_name:
        type: string
      document_type:
        type: string
      document_number:
        type: string
      email:
        type: string
        format: email
        x-nullable: true
      phone:
        type: string
        x-nullable: true
      municipality:
        type: string
        x-nullable: true
      department:
        type: string
        x-nullable: true
      country:
        type: string
        default: Colombia
      active:
        type: boolean
      metadata:
        type: object
        additionalProperties: true
      created_at:
        type: string
        format: date-time
        readOnly: true
      updated_at:
        type: string
        format: date-time
        readOnly: true
      # Optional enrichments — present only in GET /entrepreneurs/{id}
      business_profile:
        $ref: '#/definitions/BusinessProfile'
      latest_snapshot:
        $ref: '#/definitions/EntrepreneurProfileSnapshot'
      financial_profile:
        $ref: '#/definitions/FinancialProfile'

  BusinessProfile:
    type: object
    required:
      - id
      - entrepreneur_id
      - created_at
      - updated_at
    properties:
      id:
        type: string
        format: uuid
        readOnly: true
      entrepreneur_id:
        type: string
        format: uuid
      business_name:
        type: string
        x-nullable: true
      business_sector:
        type: string
        x-nullable: true
      business_activity:
        type: string
        x-nullable: true
      monthly_sales:
        type: number
        x-nullable: true
      monthly_costs:
        type: number
        x-nullable: true
      employee_count:
        type: integer
        x-nullable: true
      formalized:
        type: boolean
        x-nullable: true
      metadata:
        type: object
        additionalProperties: true
      created_at:
        type: string
        format: date-time
        readOnly: true
      updated_at:
        type: string
        format: date-time
        readOnly: true

  EntrepreneurProfileSnapshot:
    type: object
    required:
      - id
      - entrepreneur_id
      - snapshot_version
      - is_latest
      - snapshot_date
      - data
      - created_at
    properties:
      id:
        type: string
        format: uuid
        readOnly: true
      entrepreneur_id:
        type: string
        format: uuid
      source_submission_id:
        type: string
        format: uuid
        x-nullable: true
      source_sync_run_id:
        type: string
        format: uuid
        x-nullable: true
      snapshot_version:
        type: integer
        minimum: 1
      is_latest:
        type: boolean
      snapshot_date:
        type: string
        format: date-time
      data:
        type: object
        additionalProperties: true
      created_at:
        type: string
        format: date-time
        readOnly: true

  FinancialProfile:
    type: object
    required:
      - id
      - entrepreneur_id
      - raw_data
      - imported_at
      - source_file
    properties:
      id:
        type: string
        format: uuid
        readOnly: true
      entrepreneur_id:
        type: string
        format: uuid
      credit_level:
        type: string
        enum: [bajo, medio, alto, excelente]
        x-nullable: true
      loan_status:
        type: string
        x-nullable: true
      raw_data:
        type: object
        additionalProperties: true
      imported_at:
        type: string
        format: date-time
      source_file:
        type: string

  # --- credentials -------------------------------------------------------------

  Credential:
    type: object
    required:
      - id
      - organization_id
      - entrepreneur_id
      - credential_type
      - status
      - title
      - public_id
      - metadata
      - public_claims
      - created_at
      - updated_at
    properties:
      id:
        type: string
        format: uuid
        readOnly: true
      organization_id:
        type: string
        format: uuid
      entrepreneur_id:
        type: string
        format: uuid
      template_id:
        type: string
        format: uuid
        x-nullable: true
      source_draft_id:
        type: string
        format: uuid
        x-nullable: true
      source_snapshot_id:
        type: string
        format: uuid
        x-nullable: true
      credential_type:
        type: string
        enum: [impact, verification, endorsement]
      status:
        type: string
        enum: [draft, issued, revoked, expired, pending_endorsement]
      title:
        type: string
      description:
        type: string
        x-nullable: true
      public_id:
        type: string
        description: Human-readable public identifier used in the verification portal
      issued_at:
        type: string
        format: date-time
        x-nullable: true
      expires_at:
        type: string
        format: date-time
        x-nullable: true
      revoked_at:
        type: string
        format: date-time
        x-nullable: true
      issuer_did:
        type: string
        x-nullable: true
      acta_vc_id:
        type: string
        x-nullable: true
        description: Verifiable credential ID from the ACTA (Stellar blockchain) registry
      metadata:
        type: object
        additionalProperties: true
      public_claims:
        type: object
        additionalProperties: true
        description: Public-facing claims included in the issued credential
      created_by:
        type: string
        format: uuid
        x-nullable: true
      created_at:
        type: string
        format: date-time
        readOnly: true
      updated_at:
        type: string
        format: date-time
        readOnly: true

  IssuanceDraft:
    type: object
    required:
      - id
      - organization_id
      - entrepreneur_id
      - prepared_payload
      - status
      - created_at
      - updated_at
    properties:
      id:
        type: string
        format: uuid
        readOnly: true
      organization_id:
        type: string
        format: uuid
      entrepreneur_id:
        type: string
        format: uuid
      template_id:
        type: string
        format: uuid
        x-nullable: true
      latest_snapshot_id:
        type: string
        format: uuid
        x-nullable: true
      prepared_payload:
        type: object
        additionalProperties: true
        description: Serialized credential payload ready for signing and issuance
      status:
        type: string
        enum: [draft, ready, archived]
      created_by:
        type: string
        format: uuid
        x-nullable: true
      created_at:
        type: string
        format: date-time
        readOnly: true
      updated_at:
        type: string
        format: date-time
        readOnly: true

  CredentialTemplate:
    type: object
    required:
      - id
      - organization_id
      - name
      - credential_type
      - schema_version
      - template_definition
      - active
      - created_at
      - updated_at
    properties:
      id:
        type: string
        format: uuid
        readOnly: true
      organization_id:
        type: string
        format: uuid
      name:
        type: string
      credential_type:
        type: string
        enum: [impact, verification, endorsement]
      schema_version:
        type: string
        description: Semver string (e.g. "1.0.0")
      template_definition:
        type: object
        additionalProperties: true
        description: JSON schema or template definition used to render the credential
      active:
        type: boolean
      created_at:
        type: string
        format: date-time
        readOnly: true
      updated_at:
        type: string
        format: date-time
        readOnly: true

  # --- forms-sync --------------------------------------------------------------

  FormSource:
    type: object
    required:
      - id
      - organization_id
      - provider
      - external_form_id
      - name
      - active
      - created_at
      - updated_at
    properties:
      id:
        type: string
        format: uuid
        readOnly: true
      organization_id:
        type: string
        format: uuid
      provider:
        type: string
        description: Integration provider (e.g. "google_forms")
      external_form_id:
        type: string
        description: Identifier of the form in the external provider's system
      name:
        type: string
      description:
        type: string
        x-nullable: true
      active:
        type: boolean
      metadata:
        type: object
        additionalProperties: true
      created_at:
        type: string
        format: date-time
        readOnly: true
      updated_at:
        type: string
        format: date-time
        readOnly: true

  FormSubmissionRaw:
    type: object
    required:
      - id
      - form_source_id
      - external_response_id
      - raw_payload
      - raw_answers
      - synced_at
      - created_at
    properties:
      id:
        type: string
        format: uuid
        readOnly: true
      form_source_id:
        type: string
        format: uuid
      external_response_id:
        type: string
        description: Unique response ID from the external provider
      submitted_at:
        type: string
        format: date-time
        x-nullable: true
      responder_email:
        type: string
        format: email
        x-nullable: true
      raw_payload:
        type: object
        additionalProperties: true
        description: Full raw response payload from the provider
      raw_answers:
        type: object
        additionalProperties: true
        description: Normalized key-value answer map extracted from raw_payload
      checksum:
        type: string
        x-nullable: true
        description: Hash of raw_payload for deduplication
      synced_at:
        type: string
        format: date-time
      created_at:
        type: string
        format: date-time
        readOnly: true

  FormSyncRun:
    type: object
    required:
      - id
      - form_source_id
      - status
      - started_at
      - total_fetched
      - total_inserted
      - total_updated
      - total_failed
      - error_log
      - created_at
    properties:
      id:
        type: string
        format: uuid
        readOnly: true
      form_source_id:
        type: string
        format: uuid
      status:
        type: string
        enum: [running, success, partial_success, failed]
      started_at:
        type: string
        format: date-time
      finished_at:
        type: string
        format: date-time
        x-nullable: true
      total_fetched:
        type: integer
        minimum: 0
      total_inserted:
        type: integer
        minimum: 0
      total_updated:
        type: integer
        minimum: 0
      total_failed:
        type: integer
        minimum: 0
      error_log:
        type: array
        items:
          type: object
          additionalProperties: true
      metadata:
        type: object
        additionalProperties: true
      created_at:
        type: string
        format: date-time
        readOnly: true

  # --- verification ------------------------------------------------------------

  VerificationRecord:
    type: object
    required:
      - id
      - credential_id
      - verification_result
      - checked_at
    properties:
      id:
        type: string
        format: uuid
        readOnly: true
      credential_id:
        type: string
        format: uuid
      verifier_type:
        type: string
        x-nullable: true
        description: Type of verifier (e.g. "public_portal", "api_client")
      verifier_identifier:
        type: string
        x-nullable: true
        description: Identifier of the verifier (IP, DID, etc.)
      verification_result:
        type: string
        enum: [success, failed]
      checked_at:
        type: string
        format: date-time
      metadata:
        type: object
        additionalProperties: true

  # --- analytics (from db-schema JSON files) -----------------------------------

  EntrepreneurRecord:
    type: object
    description: >
      Denormalized entrepreneur record with all impact measurement fields,
      sourced from the MicroMBA impact measurement data.
    properties:
      document_number:
        type: string
      full_name:
        type: string
      business_name:
        type: string
        x-nullable: true
      program:
        type: string
        enum: ["Entrepreneurial MBA", "Agribusiness MBA"]
      ally:
        type: string
      enrollment_status:
        type: string
      gender:
        type: string
        enum: ["Woman", "Man"]
      municipality:
        type: string
      sector:
        type: string
      sales_prev_year_cop:
        type: integer
        x-nullable: true
        description: Baseline annual sales in COP (previous year)
      sales_current_year_cop:
        type: integer
        x-nullable: true
        description: Current annual sales in COP
      sales_variation_pct:
        type: number
        x-nullable: true
        description: Percentage variation in sales vs baseline
      new_jobs:
        type: integer
        x-nullable: true
        description: Net new jobs created during the program
      level:
        type: string
      cohort_name:
        type: string
      cohort_year:
        type: integer
        description: Program cohort year (e.g. 2024)
      active_credit:
        type: string
        x-nullable: true
      education_level:
        type: string
        x-nullable: true
      socioeconomic_stratum:
        type: integer
        x-nullable: true
        description: Socioeconomic stratum (1–6 in Colombian classification)
      home_zone:
        type: string
        x-nullable: true
      legal_figure:
        type: string
        x-nullable: true
      business_size:
        type: string
        x-nullable: true
      age:
        type: integer
        x-nullable: true
      age_range:
        type: string
        x-nullable: true
      requested_credit:
        type: string
        enum: ["Yes", "No"]
      overdue:
        type: string
        enum: ["Yes", "No"]
      years_in_operation:
        type: integer
        x-nullable: true
      total_costs_cop:
        type: integer
        x-nullable: true
      total_assets_cop:
        type: integer
        x-nullable: true
      total_liabilities_cop:
        type: integer
        x-nullable: true
      current_employees:
        type: integer
        x-nullable: true
      is_formalized:
        type: boolean
        x-nullable: true
      risk_category:
        type: string
        enum: [low, medium, high, insufficient_data]
        x-nullable: true
        description: >
          Derived risk level based on days_overdue and overdue_balance_cop.
          null when credit data is unavailable.
      days_overdue:
        type: integer
        x-nullable: true
        description: Days overdue from im_overdue_credits; null if no overdue record
      overdue_balance_cop:
        type: integer
        x-nullable: true
        description: Overdue balance in COP from im_overdue_credits; null if no overdue record
      credit_classification:
        type: string
        enum: [gold, silver, bronze, none]
        x-nullable: true
        description: >
          Derived from im_overdue_credits.classification:
          A → gold, B/C → silver, D/E → bronze, no credit → none
      credit_status:
        type: string
        enum: [current, overdue_30, overdue_60, overdue_90, overdue_180_plus, written_off, no_credit]
        x-nullable: true
        description: Derived credit status from classification and days_overdue
      active_credit_count:
        type: integer
        x-nullable: true
        description: Number of active credits for this entrepreneur
      accompaniment_type:
        type: string
        enum: [mba, basic_training, list]
        x-nullable: true
        description: >
          Derived from im_cohorts.program and level:
          MBA → mba, Formación básica → basic_training, Lista → list
      accompaniment_stage:
        type: string
        x-nullable: true
        description: Current stage/segment from im_measurements.credit_segment_end
      last_accompaniment_date:
        type: string
        format: date
        x-nullable: true
        description: Most recent measurement date from im_measurements

  DashboardData:
    type: object
    description: Full dashboard aggregate data for the MicroMBA GIVE Colombia program
    properties:
      metadata:
        type: object
        properties:
          program:
            type: string
          period:
            type: string
          note:
            type: string
          source:
            type: string
      summary:
        $ref: '#/definitions/DashboardSummary'
      by_program:
        type: array
        items:
          $ref: '#/definitions/DashboardByProgram'
      by_gender:
        type: array
        items:
          $ref: '#/definitions/DashboardByGender'
      by_ally:
        type: array
        items:
          $ref: '#/definitions/DashboardByAlly'
      by_age:
        type: array
        items:
          $ref: '#/definitions/DashboardByAge'
      monthly_sales:
        type: array
        items:
          $ref: '#/definitions/DashboardMonthlySales'
      portfolio:
        $ref: '#/definitions/DashboardPortfolio'
      enrollment_trend:
        type: array
        description: Enrollment growth over time per cohort/period
        items:
          $ref: '#/definitions/DashboardEnrollmentTrend'
      credit_accompaniment_gap:
        $ref: '#/definitions/DashboardCreditAccompanimentGap'
      by_accompaniment_type:
        type: array
        description: Breakdown by accompaniment type (MBA, basic training, list)
        items:
          $ref: '#/definitions/DashboardByAccompanimentType'
      formalization:
        $ref: '#/definitions/DashboardFormalization'
      by_department:
        type: array
        description: Participant count by Colombian department
        items:
          $ref: '#/definitions/DashboardByDepartment'
      by_industry:
        type: array
        description: Participant count by industry/sector
        items:
          $ref: '#/definitions/DashboardByIndustry'
      by_stratum:
        type: array
        description: Participant count by socioeconomic stratum (1–6)
        items:
          $ref: '#/definitions/DashboardByStratum'

  DashboardSummary:
    type: object
    description: High-level summary statistics for the program period
    properties:
      total_participants:
        type: integer
      active_count:
        type: integer
      retention_rate_pct:
        type: number
      women:
        type: integer
      men:
        type: integer
      women_percentage:
        type: number
      previous_year_sales_total_cop:
        type: integer
        description: Total sales of all participants at baseline (COP)
      current_year_sales_total_cop:
        type: integer
        description: Total sales of all participants at current period (COP)
      average_previous_year_sales_cop:
        type: integer
        description: Average sales per participant at baseline (COP)
      average_current_year_sales_cop:
        type: integer
        description: Average sales per participant at current period (COP)
      average_variation_pct:
        type: number
        description: Average percentage sales variation (outliers excluded)
      full_time_jobs_previous_year:
        type: integer
        description: Full-time equivalent jobs at baseline
      full_time_jobs_current_year:
        type: integer
        description: Full-time equivalent jobs at current period
      new_jobs:
        type: integer
      formalized_jobs:
        type: integer

  DashboardByProgram:
    type: object
    properties:
      program:
        type: string
      participants:
        type: integer
      average_previous_year_sales_cop:
        type: integer
      average_current_year_sales_cop:
        type: integer
      average_variation_pct:
        type: number
      new_jobs:
        type: integer

  DashboardByGender:
    type: object
    properties:
      gender:
        type: string
        enum: ["Woman", "Man"]
      participants:
        type: integer
      average_previous_year_sales_cop:
        type: integer
      average_current_year_sales_cop:
        type: integer
      average_variation_pct:
        type: number

  DashboardByAlly:
    type: object
    properties:
      ally:
        type: string
      participants:
        type: integer
      new_jobs:
        type: integer

  DashboardByAge:
    type: object
    properties:
      range:
        type: string
      participants:
        type: integer

  DashboardMonthlySales:
    type: object
    properties:
      month:
        type: string
        description: Abbreviated month name (e.g. "Jan", "Feb")
      average_cop:
        type: integer
        description: Average monthly sales across participants (COP)
      n:
        type: integer
        description: Number of participants with data for this month

  DashboardPortfolio:
    type: object
    description: Credit portfolio health metrics
    properties:
      total_with_credit:
        type: integer
      current:
        type: integer
      in_default:
        type: integer
      default_rate_pct:
        type: number
      total_overdue_balance_cop:
        type: integer
      by_classification:
        type: array
        items:
          $ref: '#/definitions/DashboardPortfolioClassification'

  DashboardPortfolioClassification:
    type: object
    properties:
      classification:
        type: string
        description: Classification code (A, B, C, D, E)
      label:
        type: string
        description: Human-readable label (e.g. "Normal (A)")
      cases:
        type: integer
      overdue_balance_cop:
        type: integer

  DashboardEnrollmentTrend:
    type: object
    description: Enrollment count for a given period/cohort, with cumulative total
    properties:
      period:
        type: string
        description: Period label, e.g. "2023-Q1" or cohort name
      year:
        type: integer
      cohort_name:
        type: string
        x-nullable: true
      program:
        type: string
      participants:
        type: integer
        description: New enrollments in this period
      cumulative_total:
        type: integer
        description: Running total of enrollments up to and including this period

  DashboardCreditAccompanimentGap:
    type: object
    description: Cross-tabulation of credit access vs active accompaniment
    properties:
      total_participants:
        type: integer
      with_credit:
        type: integer
      with_accompaniment:
        type: integer
      with_both:
        type: integer
      with_neither:
        type: integer
      credit_only_pct:
        type: number
        description: Percentage with credit but no active accompaniment
      accompaniment_only_pct:
        type: number
        description: Percentage with accompaniment but no credit
      both_pct:
        type: number
        description: Percentage with both credit and accompaniment
      gap_pct:
        type: number
        description: Percentage with credit but no active accompaniment (the GAP)

  DashboardByAccompanimentType:
    type: object
    description: Participant statistics grouped by accompaniment type
    properties:
      accompaniment_type:
        type: string
        enum: [mba, basic_training, list]
      participants:
        type: integer
      active_count:
        type: integer
      completion_rate_pct:
        type: number
        x-nullable: true

  DashboardFormalization:
    type: object
    description: Business formalization statistics
    properties:
      total:
        type: integer
      formalized:
        type: integer
      not_formalized:
        type: integer
      formalization_rate_pct:
        type: number
      by_sector:
        type: array
        items:
          type: object
          properties:
            sector:
              type: string
            total:
              type: integer
            formalized:
              type: integer
            rate_pct:
              type: number

  DashboardByDepartment:
    type: object
    description: Participant count for a Colombian department
    properties:
      department:
        type: string
      participants:
        type: integer

  DashboardByIndustry:
    type: object
    description: Participant count for an industry/sector
    properties:
      sector:
        type: string
      participants:
        type: integer

  DashboardByStratum:
    type: object
    description: Participant count for a socioeconomic stratum (1–6)
    properties:
      stratum:
        type: integer
        description: Socioeconomic stratum number (1–6)
        minimum: 1
        maximum: 6
      label:
        type: string
        description: Human-readable label, e.g. "Estrato 1"
      participants:
        type: integer

  ImpactCredentialData:
    type: object
    description: >
      Derived impact credential showing whether a business grows, sustains, or deteriorates.
    properties:
      entrepreneur_id:
        type: string
        format: uuid
      full_name:
        type: string
      document_number:
        type: string
      business_name:
        type: string
        x-nullable: true
      economic_sector:
        type: string
        x-nullable: true
      years_in_operation:
        type: integer
        x-nullable: true
      total_sales_prev_year:
        type: integer
        x-nullable: true
        description: Total annual sales in COP (previous year)
      total_sales_current_year:
        type: integer
        x-nullable: true
        description: Total annual sales in COP (current year)
      sales_variation_pct:
        type: number
        x-nullable: true
        description: "((current_sales - previous_sales) / previous_sales) × 100"
      current_full_time_employees:
        type: integer
        x-nullable: true
      new_jobs_generated:
        type: integer
        x-nullable: true
        description: current_employees - previous_employees
      new_jobs_formalized:
        type: integer
        x-nullable: true
        description: current_social_security - previous_social_security
      verdict:
        type: string
        enum: [growing, sustaining, deteriorating, insufficient_data]
        description: ">5% → growing, -5% to 5% → sustaining, <-5% → deteriorating"

  BehaviorCredentialData:
    type: object
    description: >
      Derived behavior credential showing financial stability and payment capacity indicators.
    properties:
      entrepreneur_id:
        type: string
        format: uuid
      full_name:
        type: string
      document_number:
        type: string
      credit_segment_start:
        type: string
        x-nullable: true
      credit_segment_end:
        type: string
        x-nullable: true
      credit_active_12m:
        type: boolean
        x-nullable: true
      avg_monthly_sales:
        type: integer
        x-nullable: true
      avg_monthly_costs:
        type: integer
        x-nullable: true
      total_assets:
        type: integer
        x-nullable: true
      total_liabilities:
        type: integer
        x-nullable: true
      estimated_operating_margin:
        type: number
        x-nullable: true
        description: "((sales - costs) / sales) × 100"
      leverage_ratio:
        type: number
        x-nullable: true
        description: liabilities / assets
      monthly_income_stability:
        type: number
        x-nullable: true
        description: "1 - coefficient_of_variation(monthly_sales). Closer to 1 = more stable."
      record_validity:
        type: string
        x-nullable: true
        enum: [valid, invalid, insufficient_data]
      estimated_operating_capacity:
        type: string
        x-nullable: true
        enum: [high, medium, low, insufficient_data]
        description: "Margin ≥20% → high, ≥10% → medium, <10% → low"
      leverage_level:
        type: string
        x-nullable: true
        enum: [healthy, moderate, high, insufficient_data]
        description: "Ratio ≤0.4 → healthy, ≤0.7 → moderate, >0.7 → high"
      commercial_stability:
        type: string
        x-nullable: true
        enum: [stable, moderate, volatile, insufficient_data]
        description: "CV ≤0.15 → stable, ≤0.35 → moderate, >0.35 → volatile"
      financial_trend:
        type: string
        x-nullable: true
        enum: [positive, neutral, negative, insufficient_data]
        description: "Margin ≥15% AND Leverage ≤0.5 → positive; Margin ≥5% AND Leverage ≤0.8 → neutral; otherwise → negative"

  ProfileCredentialData:
    type: object
    description: >
      Derived profile credential showing formalization level and socioeconomic context.
    properties:
      entrepreneur_id:
        type: string
        format: uuid
      full_name:
        type: string
      document_number:
        type: string
      document_type:
        type: string
        x-nullable: true
      identity_validated:
        type: boolean
        x-nullable: true
      education_level:
        type: string
        x-nullable: true
      municipality:
        type: string
        x-nullable: true
      residence_zone:
        type: string
        x-nullable: true
      is_primary_provider:
        type: boolean
        x-nullable: true
      avg_household_income:
        type: integer
        x-nullable: true
      business_formalized:
        type: boolean
        x-nullable: true
      nit:
        type: string
        x-nullable: true
      years_in_operation:
        type: integer
        x-nullable: true
      legal_figure:
        type: string
        x-nullable: true
      business_size:
        type: string
        x-nullable: true
      has_internet:
        type: boolean
        x-nullable: true
      health_regime:
        type: string
        x-nullable: true
      contributes_pension:
        type: boolean
        x-nullable: true
      compensation_fund:
        type: string
        x-nullable: true

