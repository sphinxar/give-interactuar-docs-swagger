  # ── analytics ────────────────────────────────────────────────────────────────

  /analytics/dashboard:
    get:
      tags: [analytics]
      summary: Get full dashboard aggregate data
      description: >
        Returns the complete aggregated impact metrics for the MicroMBA GIVE Colombia
        program, including sales data, employment statistics, cartera health, and
        breakdowns by program, gender, ally, and age group.
      operationId: getDashboardData
      responses:
        200:
          description: Full dashboard aggregate data object
          schema:
            $ref: '#/definitions/DashboardData'
        500:
          $ref: '#/responses/Error500'

  /analytics/entrepreneurs:
    get:
      tags: [analytics]
      summary: List entrepreneur records with all measurement fields
      description: >
        Returns denormalized individual entrepreneur records with all impact
        measurement fields sourced from the MicroMBA program data.
      operationId: listAnalyticsEntrepreneurs
      parameters:
        - name: program
          in: query
          type: string
          enum: ["Entrepreneurial MBA", "Agribusiness MBA"]
          required: false
        - name: gender
          in: query
          type: string
          enum: ["Woman", "Man"]
          required: false
        - name: ally
          in: query
          type: string
          required: false
          description: Filter by ally name (partial or exact match)
        - name: requested_credit
          in: query
          type: string
          enum: ["Yes", "No"]
          required: false
        - name: overdue
          in: query
          type: string
          enum: ["Yes", "No"]
          required: false
        - name: page
          in: query
          type: integer
          default: 1
          minimum: 1
          required: false
        - name: page_size
          in: query
          type: integer
          default: 100
          maximum: 500
          required: false
      responses:
        200:
          description: Paginated list of entrepreneur records
          schema:
            type: object
            properties:
              data:
                type: array
                items:
                  $ref: '#/definitions/EntrepreneurRecord'
              meta:
                $ref: '#/definitions/PaginationMeta'
        400:
          $ref: '#/responses/Error400'
        500:
          $ref: '#/responses/Error500'

  /analytics/entrepreneur-risk:
    get:
      tags: [entrepreneur-risk]
      summary: Entrepreneur risk table with credit and accompaniment details
      description: >
        Returns a rich, paginated list of entrepreneur records enriched with
        risk category, credit status, overdue details (days + balance),
        gold/silver/bronze classification, active credit count, accompaniment
        type and stage, and last accompaniment date.
        Data is sourced from im_overdue_credits, im_measurements, and im_cohorts.
      operationId: listEntrepreneurRisk
      parameters:
        - name: program
          in: query
          type: string
          enum: ["Entrepreneurial MBA", "Agribusiness MBA"]
          required: false
        - name: gender
          in: query
          type: string
          enum: ["Woman", "Man"]
          required: false
        - name: ally
          in: query
          type: string
          required: false
          description: Filter by ally name (partial or exact match)
        - name: overdue
          in: query
          type: string
          enum: ["Yes", "No"]
          required: false
        - name: risk_category
          in: query
          type: string
          enum: [low, medium, high, insufficient_data]
          required: false
          description: Filter by derived risk level
        - name: credit_status
          in: query
          type: string
          enum: [current, overdue_30, overdue_60, overdue_90, overdue_180_plus, written_off, no_credit]
          required: false
          description: Filter by credit status
        - name: accompaniment_type
          in: query
          type: string
          enum: [mba, basic_training, list]
          required: false
          description: Filter by accompaniment type
        - name: active_course
          in: query
          type: boolean
          required: false
          description: "true = only participants currently in an active MBA/course"
        - name: page
          in: query
          type: integer
          default: 1
          minimum: 1
          required: false
        - name: page_size
          in: query
          type: integer
          default: 50
          maximum: 200
          required: false
      responses:
        200:
          description: Paginated list of entrepreneur records with risk and accompaniment fields
          schema:
            type: object
            properties:
              data:
                type: array
                items:
                  $ref: '#/definitions/EntrepreneurRecord'
              meta:
                $ref: '#/definitions/PaginationMeta'
        400:
          $ref: '#/responses/Error400'
        500:
          $ref: '#/responses/Error500'

  /credentials/impact:
    get:
      tags: [impact-credentials]
      summary: Get impact credential(s) — business growth verdict
      description: >
        Returns derived impact credentials showing whether a business grows,
        sustains, or deteriorates based on sales and employment data.
        If entrepreneur_id is provided, returns a single record; otherwise
        returns a paginated list.
      operationId: getImpactCredentials
      parameters:
        - name: entrepreneur_id
          in: query
          type: string
          format: uuid
          required: false
          description: Entrepreneur ID. If omitted, returns all (with pagination).
        - name: year
          in: query
          type: integer
          required: false
          description: Measurement year. If omitted, uses the most recent.
        - name: verdict
          in: query
          type: string
          enum: [growing, sustaining, deteriorating, insufficient_data]
          required: false
        - name: has_business
          in: query
          type: boolean
          required: false
          description: "true = only with business, false = only without business"
        - name: has_sales
          in: query
          type: boolean
          required: false
          description: "true = only with sales, false = only without sales"
        - name: has_employees
          in: query
          type: boolean
          required: false
          description: "true = only with employees, false = only without employees"
        - name: page
          in: query
          type: integer
          default: 1
          minimum: 1
          required: false
        - name: page_size
          in: query
          type: integer
          default: 50
          maximum: 200
          required: false
      responses:
        200:
          description: >
            Single record (when entrepreneur_id is provided) or paginated list.
          schema:
            type: object
            properties:
              data:
                description: Single object if entrepreneur_id provided, array otherwise
              meta:
                $ref: '#/definitions/PaginationMeta'
        400:
          $ref: '#/responses/Error400'
        404:
          $ref: '#/responses/Error404'
        500:
          $ref: '#/responses/Error500'

  /credentials/behavior:
    get:
      tags: [impact-credentials]
      summary: Get behavior credential(s) — financial stability and payment capacity
      description: >
        Returns derived behavior credentials showing signs of financial stability
        and payment capacity based on sales, costs, assets, and liabilities.
        If entrepreneur_id is provided, returns a single record; otherwise
        returns a paginated list.
      operationId: getBehaviorCredentials
      parameters:
        - name: entrepreneur_id
          in: query
          type: string
          format: uuid
          required: false
          description: Entrepreneur ID. If omitted, returns all (with pagination).
        - name: year
          in: query
          type: integer
          required: false
          description: Measurement year. If omitted, uses the most recent.
        - name: financial_trend
          in: query
          type: string
          enum: [positive, neutral, negative, insufficient_data]
          required: false
        - name: operating_capacity
          in: query
          type: string
          enum: [high, medium, low, insufficient_data]
          required: false
        - name: leverage_level
          in: query
          type: string
          enum: [healthy, moderate, high, insufficient_data]
          required: false
        - name: credit_active
          in: query
          type: boolean
          required: false
          description: "true = with active credit, false = without credit"
        - name: has_financial_data
          in: query
          type: boolean
          required: false
          description: "true = only with complete financial data"
        - name: page
          in: query
          type: integer
          default: 1
          minimum: 1
          required: false
        - name: page_size
          in: query
          type: integer
          default: 50
          maximum: 200
          required: false
      responses:
        200:
          description: >
            Single record (when entrepreneur_id is provided) or paginated list.
          schema:
            type: object
            properties:
              data:
                description: Single object if entrepreneur_id provided, array otherwise
              meta:
                $ref: '#/definitions/PaginationMeta'
        400:
          $ref: '#/responses/Error400'
        404:
          $ref: '#/responses/Error404'
        500:
          $ref: '#/responses/Error500'

  /credentials/profile:
    get:
      tags: [impact-credentials]
      summary: Get profile credential(s) — formalization and socioeconomic context
      description: >
        Returns derived profile credentials showing the formalization level and
        socioeconomic context of entrepreneurs.
        If entrepreneur_id is provided, returns a single record; otherwise
        returns a paginated list.
      operationId: getProfileCredentials
      parameters:
        - name: entrepreneur_id
          in: query
          type: string
          format: uuid
          required: false
          description: Entrepreneur ID. If omitted, returns all (with pagination).
        - name: is_formalized
          in: query
          type: boolean
          required: false
          description: "true = only formalized businesses, false = only non-formalized"
        - name: identity_validated
          in: query
          type: boolean
          required: false
          description: "true = only with validated identity, false = not validated"
        - name: has_internet
          in: query
          type: boolean
          required: false
          description: "true = only with internet, false = without internet"
        - name: contributes_pension
          in: query
          type: boolean
          required: false
          description: "true = only pension contributors, false = non-contributors"
        - name: page
          in: query
          type: integer
          default: 1
          minimum: 1
          required: false
        - name: page_size
          in: query
          type: integer
          default: 50
          maximum: 200
          required: false
      responses:
        200:
          description: >
            Single record (when entrepreneur_id is provided) or paginated list.
          schema:
            type: object
            properties:
              data:
                description: Single object if entrepreneur_id provided, array otherwise
              meta:
                $ref: '#/definitions/PaginationMeta'
        400:
          $ref: '#/responses/Error400'
        404:
          $ref: '#/responses/Error404'
        500:
          $ref: '#/responses/Error500'
